<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Viajero — Flujo de registro de actividades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const App = () => (
  <DesignCanvas>
    <div style={{ padding: '0 40px 40px' }}>
      <div style={{ padding: '20px 60px 40px', maxWidth: 900 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase', color: '#FF6B35' }}>
          Prueba · Diseño Android
        </div>
        <div style={{ fontSize: 40, fontWeight: 800, letterSpacing: -1, color: '#0E7AAB', marginTop: 6 }}>
          Viajero — planificación grupal de actividades
        </div>
        <div style={{ fontSize: 15, color: 'rgba(60,50,40,0.7)', marginTop: 8, lineHeight: 1.5, maxWidth: 660 }}>
          Flujo colaborativo: el grupo propone, vota, modifica o elimina actividades
          futuras del viaje. Cada movimiento queda registrado y los participantes
          confirman si van, no van o tal vez. Pesos argentinos · contexto patagónico.
        </div>
      </div>
    </div>

    <DCSection
      title="1 · Hub colaborativo"
      subtitle="Vista del grupo: próximos viajes, participantes y movimientos recientes (quién agregó / modificó / eliminó qué)."
    >
      <DCArtboard label="01 · Próximos viajes + actividad del grupo">
        <Screen1_Trips/>
      </DCArtboard>
      <DCArtboard label="02 · Plan del viaje · editable por todos">
        <Screen2_Plan/>
      </DCArtboard>
    </DCSection>

    <DCSection
      title="2 · Proponer una actividad"
      subtitle="Desde el botón naranja: elegir tipo → completar día / hora / costo → invitar al grupo."
    >
      <DCArtboard label="03 · Tipo de actividad (bottom sheet)">
        <Screen3_TypePick/>
      </DCArtboard>
      <DCArtboard label="04 · Detalles, día y costo a dividir">
        <Screen4_Form/>
      </DCArtboard>
      <DCArtboard label="05 · Quién va · RSVP + votación">
        <Screen5_Invite/>
      </DCArtboard>
    </DCSection>

    <DCSection
      title="3 · Confirmación al grupo"
      subtitle="Notifica a los demás participantes y muestra el estado de respuestas en vivo."
    >
      <DCArtboard label="06 · Propuesta enviada">
        <Screen6_Posted/>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
